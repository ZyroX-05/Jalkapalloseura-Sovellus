{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
  <h1>Login</h1>

  <form action="/login" method="post">
    <p>Username:<br>
      <input type="text" name="username" required>
    </p>

    <p>Password:<br>
      <input type="password" name="password" required>
    </p>

    <p>
      <input type="submit" value="Login">
    </p>
  </form>
{% endblock %}

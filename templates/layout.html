<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Football club app{% endblock %}</title>
  </head>
  <body>
    <p>
      <a href="/">Home</a>
      <a href="/announcements/new">New announcement</a>
      <a href="/search">Search</a>

      {% if session.get("userid") %}
        Logged in as user {{ session.get("userid") }}
        <a href="/user/{{ session.get("userid") }}">My page</a>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/register">Register</a>
        <a href="/login">Login</a>
      {% endif %}
    </p>

    <hr>

    {% block content %}{% endblock %}
  </body>
</html>

<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{% block title %}Football app{% endblock %}</title>
  </head>
  <body>
    <div>
      <a href="/">Home</a>
      <a href="/announcements/new">New announcement</a>
      <a href="/search">Search</a>
      <a href="/register">Register</a>
      {% if session.username %}
        <span>Logged in as {{ session.username }}</span>
        <a href="/user/{{ session.userid }}">My page</a>
        <a href="/logout">Logout</a>
      {% else %}
        <a href="/login">Login</a>
      {% endif %}
    </div>
    <hr>
    <div>
      {% block content %}{% endblock %}
    </div>
  </body>
</html>

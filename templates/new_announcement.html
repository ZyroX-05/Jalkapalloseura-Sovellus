{% extends "layout.html" %}

{% block title %}New announcement{% endblock %}

{% block content %}
  <h1>New announcement</h1>

  <form action="/announcements/create" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">

    <p>
      <label for="title">Title</label><br>
      <input id="title" type="text" name="title" required>
    </p>

    <p>
      <label for="place">Place</label><br>
      <input id="place" type="text" name="place" required>
    </p>

    <p>
      <label for="gametime">Time</label><br>
      <input id="gametime" type="text" name="gametime" required>
    </p>

    <p>
      <label for="players">Players needed</label><br>
      <input id="players" type="number" name="players" min="1" required>
    </p>

    <p>
      <label for="description">Description</label><br>
      <textarea id="description" name="description" rows="3" cols="40" required></textarea>
    </p>

    <p>
      <label for="category">Skill level</label><br>
      <select id="category" name="category" required>
        <option value="">Choose category</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </p>

    <p>
      <input type="submit" value="Create announcement">
    </p>
  </form>
{% endblock %}

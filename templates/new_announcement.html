{% extends "layout.html" %}

{% block title %}New announcement{% endblock %}

{% block content %}
  <h1>New announcement</h1>

  <form action="/announcements/create" method="post">
    <p>Title:<br>
      <input type="text" name="title" required>
    </p>

    <p>Place:<br>
      <input type="text" name="place" required>
    </p>

    <p>Time:<br>
      <input type="text" name="gametime" required>
    </p>

    <p>Players needed:<br>
      <input type="number" name="players" min="1" required>
    </p>

    <p>Description:<br>
      <textarea name="description" rows="3" cols="40" required></textarea>
    </p>

    <p>Categories (choose skill level):<br>
      <select name="category" required>
        <option value="">Choose category</option>
        <option value="Beginner">Beginner</option>
        <option value="Intermediate">Intermediate</option>
        <option value="Advanced">Advanced</option>
      </select>
    </p>

    <p>
      <input type="submit" value="Create announcement">
    </p>
  </form>
{% endblock %}
